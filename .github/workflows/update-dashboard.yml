name: Update dashboard

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 5 * * *'   # 14:00 KST
  workflow_dispatch:       # GitHub 화면에서 "Run workflow" 버튼으로 수동 실행

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dashboard from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/build_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "update dashboard $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
